services:
  backend:
    build:
      context: ./backend
    container_name: route-risk-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: route-risk-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
